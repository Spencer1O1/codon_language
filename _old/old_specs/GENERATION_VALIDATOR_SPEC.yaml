spec:
  name: generation_validator_spec
  version: 0.1
  status: draft

validator_role:
  purpose:
    - validate generated output against the composed genome
    - detect architectural violations in expressed code and structure
    - ensure generated projects respect Codon generation rules

  assumptions:
    - the genome has already passed genome validation
    - referenced module files are valid and compose into a valid genome
    - generation has already been performed by a generator
    - generator metadata is trusted if present

responsibilities:
  - detect inconsistencies between genome intent and generated output
  - detect architectural violations in generated structure and code
  - verify that generator output faithfully expresses the composed genome
  - enforce module boundaries in generated structure
  - validate dependency realization in generated output
  - detect missing generated artifacts implied by the genome
  - verify that capabilities are expressed through services
  - verify that relations and references are expressed correctly
  - verify that generated output respects code ownership and regeneration rules

validation_scope:
  inputs:
    - genome.yaml
    - referenced module files
    - generated project structure
    - generated code artifacts
    - generator metadata if available

  validates:
    - generated module structure
    - service placement
    - repository boundaries
    - dependency realization
    - relation expression
    - reference expression
    - layer conformance
    - code ownership conformance
    - regeneration safety assumptions


  does_not_validate:
    - genome schema correctness
    - manifest and module-file consistency
    - planner mutation permissions
    - planner inference policy
    - updater reconciliation policy
    - arbitrary hand-written code quality unrelated to genome conformance

application_architecture_model:
  focus: architecture-first generation

  backend_architecture:
    style: modular-layered

    layers:
      - api
      - service
      - domain
      - repository
      - infrastructure

  architecture_rules:
    - modules own entities and capabilities
    - entities belong to exactly one module
    - services belong to modules
    - persistence is handled by repositories
    - repositories remain private to their module
    - cross-module interactions occur through allowed boundaries

validation_rules:
  generated_structure_rules:
    - generated module structure must reflect declared modules in the composed genome
    - generated entities must appear under their owning module
    - generated services must appear under their owning module
    - generated repositories must remain module-private

  capability_expression_rules:
    - every capability must be expressed through a derived or explicit service
    - generated service methods must align with declared capabilities
    - explicit service overrides must take precedence over inferred grouping

  dependency_realization_rules:
    - generated module dependencies must reflect declared dependencies
    - generated imports or references must not introduce additional forbidden coupling
    - dependent modules may reference upstream modules only through allowed boundaries

  relation_expression_rules:
    - internal relations must be expressed within the owning module
    - internal relations must not generate cross-module ownership leakage

  reference_expression_rules:
    - cross-module references must be expressed from the dependent module side
    - generated cross-module references must use reference/id semantics
    - generated references must not imply direct repository access across modules

  layer_rules:
    - api layer may depend on service layer
    - service layer may depend on domain and repository layers
    - repository layer may depend on infrastructure
    - forbidden layer shortcuts should be flagged

  code_ownership_rules:
    - generated files must appear in generator-owned locations
    - protected regions must remain preserved when regeneration metadata is available
    - extension files must not be overwritten or treated as generator-owned artifacts

severity_model:
  error:
    description: generation conformance or architectural rule violation that should fail validation

  warning:
    description: questionable generation outcome that may still be usable but should be reviewed

  suggestion:
    description: non-blocking improvement recommendation for architecture or expression