gene:
  name: auth
purpose: identity and access control
codons:
  entities:
    User:
      fields:
        id:
          type: uuid
        email:
          type: string
          unique: true
        display_name:
          type: string
        status:
          type: enum
          values:
            - active
            - disabled
    Session:
      fields:
        id:
          type: uuid
        user_id:
          type: reference
          reference: identity.auth.User
        created_at:
          type: datetime
  capabilities:
    register-user: {}
    login:
      description: establish a session for a user
      inputs:
        email:
          type: string
        password:
          type: string
      outputs:
        session_id:
          type: uuid
    logout:
      description: end a session
      inputs:
        session_id:
          type: uuid
  relations:
    - from: Session
      to: User
      type: many-to-one
      name: user
