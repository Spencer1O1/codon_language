module:
  issues:
    dependencies:
      - identity

    entities:
      Issue: {}
      Comment: {}

    capabilities:
      - create-issue
      - assign-issue
      - comment-on-issue

    relations:
      - from: Comment
        to: Issue
        type: many-to-one
        name: issue

    references:
      - from: Issue
        to: identity.User
        type: many-to-one
        name: assignee
        reference: id