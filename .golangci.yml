version: "2"

run:
  timeout: 5m

linters:
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - errcheck
    - unused
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$