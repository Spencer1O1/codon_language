gene:
  name: notify
purpose: task notifications
dependencies:
  - identity.auth
  - tasks.tasking
codons:
  entities:
    Notification:
      fields:
        id:
          type: uuid
        user_ref:
          type: reference
          reference: identity.auth.User
        task_ref:
          type: reference
          reference: tasks.tasking.Task
        channel:
          type: enum
          values: [email, push]
        message:
          type: string
  capabilities:
    send-task-assigned:
      description: notify user they were assigned a task
      inputs:
        user:
          type: reference
          reference: identity.auth.User
        task:
          type: reference
          reference: tasks.tasking.Task
        channel:
          type: enum
          values: [email, push]
      outputs:
        notification_id:
          type: uuid
