gene: tickets
description: Ticket lifecycle, photos, and routing
codons:
  entities:
    ticket:
      id: uuid
      asset_id: uuid           # assets.asset
      reporter_id: uuid        # identity.user
      assignee_id: uuid        # identity.user
      status: Union<"open","assigned","in_progress","closed">
      severity: Union<"low","medium","high">
    photo:
      id: uuid
      ticket_id: uuid          # tickets.ticket
      url: string
      captured_at: datetime
  capabilities:
    submit_report:
      description: Public user submits a maintenance report with photo and geolocation.
      effects: ["create_ticket"]
      inputs:
        asset_id: { type: uuid }
        reporter_id: { type: uuid }
        photo_url: { type: string }
        location: { type: string }
        notes: { type: Optional<string> }
      outputs:
        ticket_id: { type: uuid }
    route_ticket:
      description: Route ticket to organization based on geofence.
      effects: ["route_ticket"]
      inputs:
        ticket_id: { type: uuid }
      outputs:
        assignee_id: { type: uuid }
    update_ticket_status:
      description: Maintenance worker updates status.
      effects: ["update_ticket"]
      inputs:
        ticket_id: { type: uuid }
        status: { type: string }
      outputs:
        ticket_id: { type: uuid }
  relations:
    asset_tickets:
      from: assets.assets.asset
      to: ticket
      type: one-to-many
      ownership: from
      cascade: restrict
    ticket_photos:
      from: ticket
      to: photo
      type: one-to-many
      ownership: from
      cascade: restrict
  traits: [auditable]
