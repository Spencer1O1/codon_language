spec:
  name: patch_schema
  version: 0.1
  status: draft

patch_schema:
  purpose:
    - represent structured genome mutations
    - support planner and updater proposals
    - enable reviewable, localized, multi-file changes
    - preserve human readability and machine applicability

  principles:
    - patches must be explicit
    - patches must be localized
    - patches must be diffable
    - patches must be explainable
    - unrelated files and sections must not be rewritten
    - multi-file genome composition must be respected

patch_document:
  required_sections:
    - summary
    - rationale
    - risk
    - changes

  optional_sections:
    - evidence
    - warnings
    - suggestions
    - confidence

  section_definitions:
    summary:
      type: string
      description: short human-readable summary of the mutation set

    rationale:
      type: string
      description: explanation of why the patch is being proposed

    risk:
      type: string
      allowed_values:
        - low
        - medium
        - high
      description: overall patch risk level

    evidence:
      type: list
      description: optional observed evidence supporting the patch, especially useful for updater proposals

    warnings:
      type: list
      description: optional cautionary notes about ambiguity, destructiveness, or side effects

    suggestions:
      type: list
      description: optional follow-up recommendations related to the patch

    confidence:
      type: string
      allowed_values:
        - high
        - medium
        - low
      description: confidence in the proposed patch, especially useful for updater proposals

    changes:
      type: list
      description: ordered list of file-localized mutation operations

change_model:
  description: |
    Each change applies to exactly one target file and contains one or more
    structured operations against that file.

  required_fields:
    - id
    - file
    - operations

  field_definitions:
    file:
      type: string
      description: target genome file path, such as genome.yaml or modules/issues.yaml

    operations:
      type: list
      description: ordered mutation operations applied to the target file

operation_schema:
  description: |
    An operation is a structured mutation against a specific path inside a target file.

  required_fields:
    - id
    - op
    - path

  optional_fields:
    - value
    - old_value
    - required
    - reason

  field_definitions:
    op:
      type: string
      allowed_values:
        - add
        - update
        - remove
        - move
      description: mutation operation type

    path:
      type: string
      description: logical path within the YAML structure

    value:
      type: any
      description: new value for add or update operations

    old_value:
      type: any
      description: optional expected old value for safer updates and removals

    required:
      type: boolean
      description: whether this operation is essential to patch success
      default: true

    reason:
      type: string
      description: optional per-operation explanation

path_conventions:
  description: |
    Paths reference logical locations within YAML files using slash-separated keys.

  examples:
    - /project/name
    - /traits/0
    - /modules/issues
    - /module/issues/entities/Issue
    - /module/issues/capabilities/1

  rules:
    - paths must resolve within the target file
    - root manifest paths should target genome.yaml
    - module-local paths should target the corresponding module file
    - operations must respect genome composition boundaries
    - path segment "-" appends to a list, for example "/module/issues/capabilities/-"

localization_rules:
  - manifest-level changes must target genome.yaml
  - module-local changes must target the owning module file
  - adding a module usually requires one change to genome.yaml and one change creating a module file
  - unrelated module files should not be modified

destructive_change_rules:
  description: |
    Destructive mutations require additional clarity and explicit confirmation.

  destructive_operations:
    - remove
    - move

  requirements:
    - destructive changes must include a reason
    - destructive changes should include old_value when possible
    - destructive patches should carry medium or high risk unless clearly reversible

patch_application_rules:
  - operations must be applied in order
  - if a target file does not exist, an add operation at a valid root path may create it
  - patch application must fail safely if required paths or old_value checks do not match
  - non-required operations may be skipped with warning if safe to do so

agent_usage:
  planner:
    usage:
      - propose architecture mutations
      - prefer low-risk, localized patches
      - minimize unrelated rewrites

  updater:
    usage:
      - propose reconciliation patches
      - include evidence and confidence when possible
      - distinguish observation from inference

  traits:
    usage:
      - may expand into patch sets affecting manifest and module files
      - should remain explicit and inspectable

example_patch:
  summary: add comments to issues module
  rationale: add support for discussion on issues
  risk: low
  changes:
    - file: modules/issues.yaml
      operations:
        - op: add
          path: /module/issues/entities/Comment
          value: {}
          reason: add comment entity

        - op: add
          path: /module/issues/capabilities/-
          value: comment-on-issue
          reason: add commenting capability

        - op: add
          path: /module/issues/relations/-
          value:
            from: Comment
            to: Issue
            type: many-to-one
            name: issue
          reason: link comments to issues

example_multi_file_patch:
  summary: add notifications module
  rationale: introduce notification delivery as a new architectural module
  risk: medium
  changes:
    - file: genome.yaml
      operations:
        - op: add
          path: /modules/notifications
          value: modules/notifications.yaml
          reason: register new module file

    - file: modules/notifications.yaml
      operations:
        - op: add
          path: /module
          value:
            notifications:
              capabilities:
                - send-notification
                - list-notifications
          reason: create notifications module