spec:
  name: updater_spec
  version: 0.1
  status: draft

updater_role:
  purpose:
    - analyze user code changes
    - detect implementation drift
    - infer genome reconciliation proposals

  constraints:
    - updater does not directly modify the genome
    - updater proposes mutations only through structured patches
    - updater must preserve explicit user intent in the genome
    - updater must not treat arbitrary implementation detail as architecture by default
    - updater must respect genome composition rules (manifest + module files)

responsibilities:
  - analyze generated and user-modified code
  - compare implementation structure against genome intent
  - detect architectural drift
  - detect likely new modules, entities, capabilities, relations, references, and service overrides
  - propose genome reconciliation patches
  - explain inferred changes in human-readable form

inputs:
  required:
    - genome.yaml
    - module definition files
    - generated project source tree

  optional:
    - generator metadata
    - prior generation manifest
    - file ownership metadata
    - user hints or update scope filters

genome_composition_awareness:
  description: |
    Codon genomes consist of a root manifest (genome.yaml) and
    individual module files referenced by the manifest.

  updater_responsibilities:
    - reconcile manifest-level drift in genome.yaml
    - reconcile module-local drift in the appropriate module file
    - avoid rewriting unrelated module files
    - preserve module-level encapsulation

  reconciliation_targets_by_file:
    genome_manifest:
      contains:
        - project metadata
        - project-level traits
        - module registry

    module_files:
      contain:
        - module dependencies
        - entities
        - capabilities
        - relations
        - references
        - service overrides

update_scope:
  detects:
    - new modules
    - removed modules
    - new entities
    - removed entities
    - likely capability additions
    - likely service override emergence
    - internal relation changes
    - cross-module reference changes
    - trait-related architectural additions
    - dependency graph changes

  avoids:
    - treating small helper functions as genome-level concepts
    - inferring architecture from temporary hacks or experimental code
    - rewriting unrelated genome sections
    - interpreting formatting-only changes as architecture drift

drift_detection_model:
  principles:
    - genome remains the architectural source of truth until reconciliation is approved
    - implementation may evolve beyond the last generated genome
    - updater should infer only architecture-relevant changes
    - additive drift is safer to infer than destructive drift
    - explicit genome definitions take precedence over ambiguous code patterns

  evidence_sources:
    - module directory structure
    - entity/model definitions
    - service structure
    - route/handler additions
    - repository patterns
    - migration files
    - imports and dependency direction
    - generator-owned vs user-owned file boundaries

inference_strategy:
  defaults:
    - prefer additive proposals over destructive proposals
    - prefer module-level interpretation before entity-level interpretation
    - prefer semantic capabilities over structured capability definitions unless clear evidence suggests otherwise
    - prefer derived services unless explicit service grouping is evident
    - prefer references over ownership when cross-module identity linkage is detected

  examples:
    - detect a new model and repository in one module and propose a new entity
    - detect a new handler plus service flow and propose a new capability
    - detect repeated explicit service split patterns and propose a service override
    - detect foreign-key-by-id usage across modules and propose a reference

reconciliation_policy:
  principles:
    - updater proposes, user approves
    - approved reconciliations become new genome history
    - reconciliations should be minimal and localized
    - destructive reconciliations require stronger confidence and explicit confirmation

  localization_rules:
    - manifest-level changes must be proposed against genome.yaml
    - module-level changes must be proposed against the owning module file
    - cross-module changes should modify the smallest valid set of files
    - unrelated module files should not be rewritten

  additive_changes:
    examples:
      - add module
      - add entity
      - add capability
      - add relation
      - add reference
      - add service override

  destructive_changes:
    examples:
      - remove module
      - remove entity
      - remove capability
      - remove relation
      - replace explicit service override
      - remove reference

  destructive_policy:
    - destructive proposals require explicit confirmation
    - destructive proposals must be clearly explained
    - destructive proposals should include supporting evidence

patch_interface:
  schema_reference: patch_schema

  description: |
    The updater proposes genome reconciliation mutations using the shared
    patch_schema. Patches must conform to the structure defined in
    patch_schema.yaml.

  updater_expectations:
    - patches should be minimal and localized
    - patches should avoid rewriting unrelated files
    - manifest-level changes should target genome.yaml
    - module-level changes should target the owning module file
    - cross-module changes should modify the smallest valid set of files
    - updater patches should include evidence when possible
    - updater patches should include confidence when possible

  required_patch_sections:
    - summary
    - rationale
    - changes

  recommended_patch_sections:
    - evidence
    - confidence
    - warnings

  presentation_rules:
    - updater should distinguish observed implementation changes from inferred architectural meaning
    - updater should highlight ambiguous inferences
    - updater should separate high-confidence and low-confidence proposals
    - updater should highlight destructive proposals separately

  patch_localization_rules:
    - manifest-level mutations must target genome.yaml
    - module-level mutations must target the module file
    - patches should modify the smallest possible set of files

presentation_rules:
  - updater should distinguish observed implementation changes from inferred architectural meaning
  - updater should highlight ambiguous inferences
  - updater should separate high-confidence and low-confidence proposals
  - updater should highlight destructive proposals separately

confidence_model:
  high_confidence:
    examples:
      - clear new module folder with matching service and repository structure
      - repeated new entity usage in model, migration, and service layers
      - explicit cross-module id reference patterns

  medium_confidence:
    examples:
      - likely new capability inferred from handler and service naming
      - likely service grouping inferred from multiple related methods

  low_confidence:
    examples:
      - possible trait emergence from scattered infrastructure changes
      - business-rule inference from isolated helper logic

  behavior:
    - high-confidence changes may be proposed directly
    - medium-confidence changes should include caveats
    - low-confidence changes should be framed as suggestions, not assumptions

safety_model:
  forbidden:
    - silent genome rewrites
    - broad speculative architecture rewrites
    - inferring module ownership from weak evidence alone
    - collapsing explicit genome structure into inferred shortcuts
    - removing explicit user-defined structure without confirmation

  required:
    - preserve explicit genome intent unless overridden by approved reconciliation
    - respect code ownership boundaries where metadata exists
    - treat user-authored extension code carefully