

repository_model:
  genome_repository:
    description: |
      A Codon project is a genome repository containing
      semantic architecture and expression rules.

    contents:
      - genome.yaml
      - chromosomes/
      - expression/
      - .git

    composition:
      - genome.yaml is the root manifest
      - chromosomes organize genes by domain
      - genes live as yaml files inside chromosome directories
      - expression defines how the genome projects into implementation artifacts
      - the composed genome is genome.yaml plus all chromosome gene files

    git_policy:
      tracked_files:
        - genome.yaml
        - chromosomes/**/*.yaml
        - expression/**/*.yaml

      ai_change_policy:
        - AI proposes mutation
        - user approves mutation
        - Codon applies mutation
        - Codon auto-commits change

  generated_project:
    description: |
      Generated application code exists outside the genome repository.

    properties:
      - generated code is implementation output
      - the genome remains the architectural source of truth
      - implementation structure may differ from genome structure according to expression rules
      - generated projects may optionally have their own git repository

    generation_rules:
      - expression must not overwrite existing directories unless forced
      - output location must be explicit or derived from cwd
      - regeneration behavior should preserve user-owned code according to generator rules

expression_model:
  description: |
    Expression defines how semantic genome structure becomes
    concrete implementation artifacts in a target stack.

  responsibilities:
    - define architecture style
    - define projection rules
    - define naming and packaging conventions
    - define implementation layering expectations

  principles:
    - genome structure is semantic
    - implementation structure is projected
    - one gene may express into multiple implementation artifacts
    - the same genome may be expressed through different styles

cli_interface:
  core_commands:
    - init
    - genome
    - evolve
    - express
    - mutate
    - sequence
    - lineage
    - verify

  compatibility_aliases:
    view: genome
    edit: evolve
    generate: express
    sync: mutate
    validate: sequence
    history: lineage

  commands:
    init:
      description: initialize a new genome repository
      example: codon init my-project
      behavior:
        - create genome repository
        - create genome.yaml
        - create chromosomes/ directory
        - create expression/ directory
        - initialize git
        - create initial commit
        - optionally perform initial genome setup

    genome:
      description: inspect composed genome structure
      example: codon genome my-project
      behavior:
        - read genome.yaml
        - inspect chromosomes and genes
        - summarize composed genome structure

    evolve:
      description: AI-guided genome evolution
      example: codon evolve my-project "issue tracker with users, projects, issues, comments"
      behavior:
        - analyze prompt and current genome
        - propose genome mutation
        - display summary and diff
        - require approval before applying changes
        - apply approved mutation
        - auto-commit approved mutation

    express:
      description: express genome into application code
      example: codon express my-project
      behavior:
        - read genome
        - read expression rules
        - project architecture into the target stack
        - write output to target directory

    mutate:
      description: reconcile genome from implementation changes
      example: codon mutate my-project --from C:/Dev/my-project
      behavior:
        - analyze codebase changes
        - detect architectural drift
        - infer candidate genome mutation
        - propose patch
        - require approval before applying changes
        - apply approved mutation
        - auto-commit approved mutation

    sequence:
      description: validate genome architecture and consistency
      example: codon sequence my-project
      outputs:
        - errors
        - warnings
        - architectural suggestions
      rules:
        - sequencing operates on the composed genome
        - sequencing validates chromosomes, genes, codons, references, and expression consistency
        - sequencing does not mutate the genome

    lineage:
      description: inspect genome evolution history
      example: codon lineage my-project
      behavior:
        - show git commit history
        - summarize mutations
        - surface major architectural milestones

    verify:
      description: validate generated output against the genome
      example: codon verify my-project
      behavior:
        - read genome
        - read expression rules
        - analyze generated project structure
        - report architecture fidelity issues

system_roles:
  evolver:
    purpose:
      - interpret system goals
      - define or evolve architecture
      - propose genome mutations

  validator (sequencer):
    purpose:
      - validate the composed genome
      - detect architectural and schema violations
      - ensure the genome is valid before expression

  expresser:
    purpose:
      - express genomes into code
      - generate architecture scaffolds
      - honor expression style and projection rules

  verifier:
    purpose:
      - validate generated output against the composed genome and expression rules
      - detect generation fidelity issues

  mutator:
    purpose:
      - analyze user code changes
      - detect implementation drift
      - infer genome reconciliation proposals

patch_system:
  description: structured mutations applied through explicit patches
  schema_reference: patch_schema

  rules:
    - AI cannot rewrite genome directly
    - mutations must be explicit
    - user approval is required
    - approved mutations are auto-committed

operating_model:
  local_first: true

  local_role:
    - store genome history in git
    - enable diff, revert, and offline evolution

  cloud_role:
    - run AI system roles
    - orchestrate expression
    - host optional project metadata
    - support collaboration

future_capabilities:
  - collaborative genome editing
  - branch-aware planning
  - architecture visualization
  - regeneration with merge awareness
  - cross-project trait libraries
  - infrastructure generation
  - automated architecture drift detection
  - multiple expression styles per genome
  - domain-level sequencing and expression