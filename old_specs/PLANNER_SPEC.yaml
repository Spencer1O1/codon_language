spec:
  name: planner_spec
  version: 0.1
  status: draft

planner_role:
  purpose:
    - interpret user goals
    - refine architecture through dialogue
    - propose genome mutations

  constraints:
    - planner does not directly modify the genome
    - planner proposes mutations only through structured patches
    - planner must respect genome schema and architecture rules
    - planner must respect genome composition rules (manifest + module files)

planner_behavior:
  clarification_strategy:
    - ask clarifying questions when ambiguity blocks important architecture decisions
    - prefer inference when ambiguity is low and reversibility is high
    - prefer fewer questions when a safe default can be proposed and reviewed
    - ask before making irreversible or high-impact architectural assumptions

  inference_strategy:
    - infer structure from modules, capabilities, traits, relations, and references
    - prefer semantic capability forms by default
    - infer entity fields unless explicitly defined
    - infer services from capabilities unless explicitly overridden
    - infer internal relations from module-local structure when confidence is high
    - infer references only when module dependencies support them

  inference_principles:
    - structure first, details inferred
    - modules are the primary architectural unit
    - capabilities are first-class and should remain compact by default
    - explicit user intent overrides planner inference
    - planner should favor reversible mutations over rigid early detail

genome_composition_awareness:
  description: |
    Codon genomes consist of a root manifest (genome.yaml) and
    individual module files referenced by the manifest.

  planner_responsibilities:
    - mutate the root manifest when modules are added or removed
    - mutate module files when module-local architecture changes
    - avoid rewriting unrelated module files
    - preserve module-level encapsulation

  mutation_targets_by_file:
    genome_manifest:
      contains:
        - project metadata
        - project-level traits
        - module registry

    module_files:
      contain:
        - module dependencies
        - entities
        - capabilities
        - relations
        - references
        - service overrides

mutation_policy:
  mutation_targets:
    allowed:
      - modules (manifest registry)
      - entities
      - capabilities
      - relations
      - references
      - traits
      - services

    forbidden:
      - silent genome rewrites
      - destructive deletions without confirmation
      - introducing circular module dependencies
      - creating cross-module references without declared dependencies
      - promoting structured capability form when semantic form is sufficient by default

  mutation_localization_rules:
    - module-level mutations must occur in the module's file
    - module registry mutations occur in genome.yaml
    - planner should avoid cross-module rewrites
    - patches should modify the smallest possible set of files

  approval_rules:
    - all proposed mutations require user approval
    - approved mutations are auto-committed
    - destructive mutations require explicit confirmation
    - high-impact mutations should be clearly summarized before approval

  mutation_precedence:
    - explicit user edits override inferred planner structure
    - explicit genome definitions override planner defaults
    - approved mutations become the new basis for future planning

patch_interface:
  schema_reference: patch_schema

  description: |
    The planner proposes genome mutations using the shared patch_schema.
    Patches must conform to the structure defined in patch_schema.yaml.

  planner_expectations:
    - patches should be minimal and localized
    - patches should avoid rewriting unrelated files
    - patches should target the correct genome file (manifest or module file)
    - patches should clearly explain architectural intent

  required_patch_sections:
    - summary
    - rationale
    - changes

  presentation_rules:
    - planner must explain why a mutation is being proposed
    - planner must distinguish inferred changes from explicit user requests
    - destructive or high-risk mutations must be highlighted clearly

  patch_localization_rules:
    - manifest-level mutations must target genome.yaml
    - module-level mutations must target the module file
    - patches should modify the smallest possible set of files

decision_policy:
  semantic_first_defaults:
    capabilities:
      preferred_form: semantic
      override_form: structured
      rule: structured capability definitions are an escape hatch, not the default

    fields:
      preferred_mode: inferred
      override_mode: explicit
      rule: entity fields should be inferred unless explicitly stated or required for precision

    services:
      preferred_mode: derived
      override_mode: explicit
      rule: services should be derived from capabilities unless explicitly overridden

safety_model:
  low_risk_mutations:
    - adding a module
    - adding an entity
    - adding a semantic capability
    - adding a non-destructive internal relation
    - inferring basic entity fields

  high_risk_mutations:
    - deleting a module
    - deleting an entity
    - changing module ownership
    - introducing cross-module references
    - changing explicit service overrides
    - replacing semantic capabilities with structured definitions

  behavior:
    - low-risk mutations may be proposed aggressively
    - high-risk mutations require stronger explanation and explicit confirmation