gene:
  name: patch_integration

purpose: define how genome mutations are represented against genome structure

codons:
  mutation_integration:
    description: |
      Genome mutations are represented through patches and applied to
      defined semantic targets within the genome.

    rules:
      - genome mutations must be representable through the shared patch schema
      - root-level mutations target genome
      - gene-level mutations target addressed genes
      - target resolution to storage locations is handled by the mutation engine
      - future chromosome-level mutations may target grouped structural changes