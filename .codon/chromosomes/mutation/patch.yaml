gene:
  name: patch

dependencies:
  - genome.addressing
  - mutation.patch_base

purpose: define the structure and rules of patch documents used to represent genome mutations

codons:
  patch_principles:
    description: |
      Patches represent explicit structural mutations against a genome.

    semantics:
      - represent structured genome mutations
      - support evolution and reconciliation proposals
      - enable reviewable, localized, multi-target changes
      - preserve human readability and machine applicability

    constraints:
      - patches must be explicit
      - patches must be localized
      - patches must be diffable
      - patches must be explainable
      - unrelated structures must not be rewritten
      - composed genome boundaries must be respected

  patch_definition:
    description: define the top-level structure of a patch document

    schema:
      required_members:
        - summary
        - rationale
        - risk
        - changes

      optional_members:
        - evidence
        - warnings
        - suggestions
        - confidence

      members:
        summary:
          type: string
          description: short human-readable summary of the mutation set

        rationale:
          type: string
          description: explanation of why the patch is being proposed

        risk:
          type: mutation.patch_base.risk_level

        evidence:
          type: list

        warnings:
          type: list

        suggestions:
          type: list

        confidence:
          type: mutation.patch_base.confidence_level

        changes:
          type: list
          item_type: mutation.patch.change_definition

    guidance:
      - risk_level is author-declared and independent of engine-evaluated validation severity

    examples:
      single_target_patch:
        summary: add comments to issues gene
        rationale: add support for discussion on issues
        risk: low
        changes:
          - id: change-1
            target: tracking.issues
            operations:
              - id: op-1
                op: add
                path: /codons/entities/Comment
                value: {}
                reason: add comment entity

              - id: op-2
                op: add
                path: /codons/capabilities/-
                value: comment-on-issue
                reason: add commenting capability

              - id: op-3
                op: add
                path: /codons/relations/-
                value:
                  from: Comment
                  to: Issue
                  type: many-to-one
                  name: issue
                reason: link comments to issues

      multi_target_patch:
        summary: add notifications gene
        rationale: introduce notification delivery as a new architectural unit
        risk: medium
        changes:
          - id: change-1
            target: notifications.alerts
            operations:
              - id: op-1
                op: add
                path: /gene
                value:
                  name: alerts
                reason: create alerts gene

              - id: op-2
                op: add
                path: /codons/capabilities
                value:
                  - send-notification
                  - list-notifications
                reason: define notification capabilities

  change_definition:
    description: |
      A change applies to exactly one semantic target and contains
      one or more operations against that target.

    schema:
      required_members:
        - id
        - target
        - operations

      members:
        id:
          type: string

        target:
          type: mutation.patch_base.change_target

        operations:
          type: list
          item_type: mutation.patch.operation_definition

  change_target:
    description: alias to patch_base.change_target for legacy references

  operation_definition:
    description: |
      An operation is a structured mutation against a path inside
      the addressed semantic target.

    schema:
      required_members:
        - id
        - op
        - path

      optional_members:
        - value
        - old_value
        - required
        - reason

      members:
        id:
          type: string

        op:
          type: mutation.patch.operation_type

        path:
          type: string

        value:
          type: any

        old_value:
          type: any

        required:
          type: boolean
          default: true

        reason:
          type: string

  path_rules:
    description: |
      Paths reference logical locations inside semantic genome
      structures using slash-separated keys.

    examples:
      reference_paths:
        - /project/name
        - /traits/0
        - /expression/active_style
        - /gene/name
        - /codons/entities/Issue
        - /codons/capabilities/-

    semantics:
      - paths address logical locations inside the semantic target using slash-separated keys

    constraints:
      - paths must resolve within the addressed target
      - root-level paths apply only to genome
      - gene-local paths apply only to the addressed gene
      - list indices are zero-based
      - numeric indices must resolve to an existing element
      - the symbol "-" appends to a list and may appear only as the final segment of an add operation
      - operations must respect composed genome boundaries

  target_resolution:
    description: define how semantic patch targets map to storage locations

    semantics:
      - target resolution is handled by the mutation engine
      - root targets resolve to genome.yaml
      - gene targets resolve to the canonical gene file under chromosomes/<chromosome>/<gene>.yaml

    constraints:
      - the canonical gene filename must use the gene name as the filename stem
      - gene creation may implicitly introduce the addressed chromosome when no chromosome directory for that identifier already exists
      - if the addressed chromosome directory does not exist, the mutation engine must create it during patch application
      - chromosome directories created during patch application must not introduce additional metadata or files
      - an empty chromosome directory is sufficient prior to writing the gene file
      - resolution must be deterministic

  destructive_change_rules:
    description: destructive mutations require additional clarity

    operations:
      - remove

    constraints:
      - destructive operations must include a reason
      - if old_value is supplied it must match before the operation is applied

    guidance:
      - destructive operations should include old_value when possible
      - destructive patches should carry medium or high risk unless clearly reversible

  application_rules:
    processing:
      - changes must be applied in document order
      - changes targeting the same semantic target must be applied sequentially in document order
      - operations must be applied in order within each change
      - operations are evaluated against the current state produced by prior operations in the same patch
      - non-required operations may be skipped only when doing so does not invalidate later required operations or final genome validity
      - operations creating structural prerequisites must not be skipped
      - implementations may use staging, rollback, or equivalent mechanisms to ensure atomicity

    constraints:
      - required operation failure must abort the patch
      - patch application must be atomic across all changes
      - partial patch application must not be externally visible or persisted
      - if any required operation fails, the persisted genome state must remain unchanged
      - target resolution and operation execution must remain deterministic

  operation_semantics:
    description: define deterministic behaviors for patch operations on maps and lists

    add:
      semantics:
        - object paths: add inserts or replaces the value at the addressed key
        - list paths: add inserts at the addressed zero-based index; path '-' appends
      constraints:
        - for object paths, add must create or overwrite exactly one key
        - for list paths, add must respect zero-based indices or '-' append
        - add operations must be deterministic for the same input state and patch
      guidance:
        - prefer add for introducing new keys or list elements; use update to modify existing ones

    update:
      semantics:
        - object paths: update replaces the entire value at the addressed key; no deep merge is performed
        - list paths: update replaces the element at the addressed zero-based index
      constraints:
        - the addressed path must exist at the time of application
        - when old_value is supplied, it must match the current value before applying the update
        - update operations must be deterministic for the same input state and patch
      guidance:
        - prefer using add when introducing new keys or list elements; update should modify existing ones

    remove:
      semantics:
        - object paths: remove deletes the addressed key
        - list paths: remove deletes the addressed element and reindexes the list
      constraints:
        - the addressed path must exist at the time of application
        - when old_value is supplied, it must match the current value before applying the removal
        - remove operations must be deterministic for the same input state and patch

  validation_results:
    description: structure for reporting validation output from patch application

    schema:
      members:
        highest_severity:
          type: mutation.patch_base.validation_severity
        results:
          type: list
          item_type: mutation.patch_base.operation_result
