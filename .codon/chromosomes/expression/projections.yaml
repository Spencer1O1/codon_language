gene:
  name: projections

dependencies:
  - expression.style

purpose: define the structure and rules of expression projection mappings

codons:
  projection_definition:
    description: |
      Projection mappings describe how semantic genome structures
      are expressed into implementation artifacts.

    principles:
      - projections operate on semantic structures rather than raw files
      - projections may map one semantic construct to multiple implementation artifacts
      - projections must preserve semantic meaning
      - projections are governed by the active expression style
      - projections must not generate or modify the genome specification itself

  projection_targets:
    description: define supported semantic targets for projection mappings

    supported_targets:
      - chromosome
      - gene
      - codon

    constraints:
      - projection targets must reference semantic structures defined by the genome
      - projection targets must not introduce new semantic primitives

  output_definition:
    description: define a projected implementation artifact

    schema:
      required_members:
        - layer
        - path

      members:
        layer:
          type: expression.style.layer_name
          description: implementation layer that owns the projected artifact

        path:
          type: string
          description: output path template for the projected artifact

    constraints:
      - output layers must exist in the active expression style
      - output paths must be deterministic for a given target and style
      - output paths may use supported template variables
      - projections must not write files inside the genome repository

  template_variables:
    description: define supported variables in projection path templates

    semantic_variables:
      chromosome:
        source: chromosome identifier
      gene:
        source: gene.name
      codon:
        source: codon identifier
      entity:
        source: entity identifier
      capability:
        source: capability identifier
      relation:
        source: relation identifier
      trait:
        source: trait identifier

    generator_variables:
      rule:
        source: validation rule identifier
      helper:
        source: internal helper identifier
      helper_group:
        source: internal helper grouping identifier

    derived_variables:
      chromosome_snake:
        source: chromosome
      gene_snake:
        source: gene
      codon_snake:
        source: codon
      entity_snake:
        source: entity
      capability_snake:
        source: capability
      relation_snake:
        source: relation
      trait_snake:
        source: trait
      rule_snake:
        source: rule
      helper_snake:
        source: helper

    normalization:
      constraints:
        - derived variables must be computed deterministically from their declared source
        - snake variants must use lowercase identifiers with underscore separators
        - hyphens and spaces must normalize to underscores
        - repeated separators must collapse to a single underscore
        - leading and trailing separators must be removed

    constraints:
      - only declared template variables may be used in projection paths
      - template variable resolution must be deterministic
      - unknown template variables must be rejected unless enabled by future schema versions

  projection_rules:
    description: define rules for projection mappings

    semantics:
      - chromosome projections may influence grouping but need not map directly to top-level directories
      - gene projections may produce one or more implementation artifacts
      - codon projections may produce one or more implementation artifacts
      - implementation structure may differ from genome structure according to projection rules

    constraints:
      - projections must remain compatible with the active expression style
      - projection path generation must be deterministic for a given genome and expression configuration
