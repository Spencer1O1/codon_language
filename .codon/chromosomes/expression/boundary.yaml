gene:
  name: boundary

purpose: define the boundary between semantic genome structure and derived implementation artifacts

codons:
  semantic_model:
    description: the genome captures semantic architecture, not implementation details
    semantics:
      - the genome defines domains, models, actions, and relationships
      - the semantic model must remain independent of programming languages or frameworks
    guidance:
      - prefer semantic nouns/verbs over implementation-layer concepts in genome sources

  derived_artifacts:
    description: implementation-oriented constructs that are produced from the semantic model
    examples:
      - services
      - controllers
      - handlers
      - repositories
      - api_routes
      - database_tables
    semantics:
      - derived artifacts are not part of the semantic genome; they are outputs of expression
    guidance:
      - keep implementation artifacts in expression outputs, not in genome source codons

  expression_projection:
    description: projections map semantic genome structures into implementation artifacts
    constraints:
      - core genome schema remains purely semantic
      - implementation artifacts are produced through expression, not authored in genome sources
      - projections must not alter the semantic meaning of the genome
    guidance:
      - capabilities are primary semantic action units for many projections
