gene:
  name: style

purpose: define the structure and rules of expression styles

codons:
  style_definition:
    description: |
      An expression style defines a reusable implementation projection
      strategy for a genome.

    principles:
      - expression styles define how semantic genome structure is projected into implementation artifacts
      - expression styles must not change the semantic meaning of the genome
      - expression styles may vary by language, architecture, or packaging strategy
      - the same genome may be expressed through different styles

    schema:
      required_members:
        - id
        - language
        - layers
        - dependency_rules

      optional_members:
        - description
        - principles

      members:
        id:
          type: string
          description: unique identifier for the expression style

        description:
          type: string
          description: optional human-readable description of the style

        language:
          type: string
          description: implementation language targeted by the style

        principles:
          type: list
          description: optional guiding principles of the style

        layers:
          type: list
          item_type: expression.style.layer_name
          description: ordered set of implementation layers used by the style

        dependency_rules:
          type: object
          description: layer-specific dependency constraints

  layer_name:
    description: define the identifier of an implementation layer

    constraints:
      - layer names must be unique within a style
      - layer names should be stable identifiers suitable for use in projection rules

  dependency_rule:
    description: define permitted dependencies for a layer

    schema:
      required_members:
        - may_depend_on

      members:
        may_depend_on:
          type: list
          item_type: expression.style.layer_name
          description: layers that the declaring layer may depend on

    constraints:
      - dependency rules must reference declared layers
      - dependency graphs should be acyclic unless explicitly allowed by future schema versions

  constraints:
    - style identifiers must be unique within the active expression context
    - all declared dependency rules must target known layers
    - every declared layer should have a dependency rule
