gene:
  name: rules

dependencies:
  - validation.pipeline

purpose: catalog validation rule categories and their default severities

codons:
  rule_catalog:
    description: list validation rule categories, intent, and default severity

    schema:
      members:
        structural:
          severity: error
          description: schema conformance, required members, allowed keys

        identifiers:
          severity: error
          description: identifier forms, reserved words, uniqueness per scope

        dependencies:
          severity: error
          description: dependency existence, acyclicity, declaration for cross-gene references

        references:
          severity: error
          description: reference target existence and compatibility

        relations:
          severity: error
          description: relation endpoints exist in declaring gene

        uniqueness:
          severity: error
          description: duplicate genes/entities/capabilities/relations/references

        traits:
          severity: warning
          description: duplicate trait declarations

        reserved_words:
          severity: warning
          description: non-blocking reserved-word usage (elevate to error when it breaks resolution)

        normalization:
          severity: info
          description: notices about inferred defaults or normalization steps unless they reveal conflicts

    guidance:
      - engines may elevate severity when a warning category prevents deterministic resolution
      - custom rule sets may override severities but must document deviations
