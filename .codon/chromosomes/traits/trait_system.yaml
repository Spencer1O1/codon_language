gene:
  name: trait_system

purpose: define reusable architectural traits and their expansion behavior

codons:
  trait_definition:
    description: |
      Traits are reusable architectural programs that expand into
      concrete genome structure.

    philosophy:
      - traits provide reusable architecture patterns
      - traits expand into standard genome constructs
      - traits do not introduce new semantic primitives
      - trait expansion must be deterministic

  trait_library:
    description: |
      The trait library defines reusable traits and their structural
      expansions.

    responsibilities:
      - define trait semantics
      - define the structural expansions introduced by a trait
      - define dependencies, conflicts, and prerequisites
      - define external integration requirements when needed
      - produce expansions compatible with genome composition
      - emit or support mutations compatible with the shared patch system

  trait_expansion:
    description: |
      Trait expansion describes what structures traits may introduce
      depending on where they are attached.

    project_level:
      allowed_introductions:
        - chromosomes
        - genes
        - entities
        - capabilities
        - relations
        - references
        - traits

    gene_level:
      allowed_introductions:
        - entities
        - capabilities
        - relations
        - references
        - traits

  expansion_rules:
    constraints:
      - project-level traits may introduce new chromosomes when required by their architecture
      - gene-level traits must expand only within the owning gene
      - trait expansion must respect genome composition boundaries
      - trait expansion must remain deterministic for a given trait definition and input genome
      - trait expansion must produce genome structure that conforms to genome composition rules
      - traits must not introduce filesystem layouts or nesting patterns forbidden by the active composition model
