gene:
  name: loader

purpose: define how genome repositories are discovered and loaded

codons:
  genome_repository_discovery:
    description: |
      Genome loading begins by identifying a genome repository.
      A genome repository is the directory containing genome.yaml,
      the associated genome structure, and its own Git repository.

    forms:
      standalone:
        description: genome repository is rooted at the current project directory
        example: ./genome.yaml

      embedded:
        description: genome repository exists inside a reserved nested directory
        reserved_directory: .codon
        example: ./.codon/genome.yaml

    search_behavior:
      description: |
        When the caller does not explicitly provide a genome repository root,
        the loader may attempt automatic discovery.

      processing:
        - discovery begins at the caller working directory
        - the loader must check for a genome repository rooted at the current directory
        - the loader must check for an embedded genome repository in .codon/
        - if neither exists, discovery proceeds to the parent directory
        - discovery continues upward until a genome repository is found or filesystem root is reached
        - the nearest valid genome repository must be selected

      constraints:
        - if multiple valid genome repositories exist at the same search level, discovery must fail as ambiguous

    discovery_limits:
      description: define the stopping conditions for automatic discovery

      constraints:
        - automatic discovery must stop at filesystem root if no genome repository is found
        - explicit caller-provided genome repository roots bypass automatic search limits

    constraints:
      - explicit caller-provided genome repository roots take precedence over automatic discovery
      - embedded genome repositories must use the reserved directory name .codon
      - genome repository discovery must remain deterministic for a given filesystem state

  repository_rules:
    description: define structural requirements of a genome repository

    constraints:
      - the genome repository root must satisfy the composition_root rules defined by the composition model
      - genome repositories must contain genome.yaml and their own .git directory
      - embedded genome repositories must remain distinct from the outer project repository
      - the outer project repository and embedded genome repository must not be treated as the same repository
      - a composition_root without .git is structurally recognizable but must not be treated as a valid genome repository

  loading_rules:
    description: define how a discovered genome repository is loaded

    processing:
      - the loader must read genome.yaml from the genome repository root
      - the loader must discover genes under chromosomes/ relative to the genome repository root
      - gene discovery must follow the active genome composition rules
      - the loader may parse invalid files for diagnostics but must not treat them as valid composed genome structure
      - all genome-relative paths must be resolved from the genome repository root

    constraints:
      - only files admitted by genome composition rules may be parsed as gene files
      - hidden files excluded by composition rules must not be treated as gene files
      - loaders must fail clearly when genome structure is present but the required .git directory is missing; the loader must fail immediately and must not proceed with genome validation or composition
      - loader behavior must be deterministic for a given genome repository and filesystem state
