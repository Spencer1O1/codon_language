gene:
  name: manifest

purpose: define the schema of genome.yaml

codons:
  genome_manifest:
    description: |
      genome.yaml is the root manifest of a genome repository and defines
      project-wide metadata and global genome configuration.

    schema:
      required_members:
        - project
        - schema_version
      optional_members:
        - traits
        - expression

      members:
        schema_version:
          type: string
          constraints:
            - must follow semantic versioning (MAJOR.MINOR.PATCH)
        project:
          type: object
        traits:
          type: list
        expression:
          type: object

    constraints:
      - unknown fields must be rejected unless enabled by the active schema version
      - genome.yaml must not contain inline chromosome or gene definitions

  project:
    description: project-wide metadata

    schema:
      required_members:
        - name
      optional_members:
        - description
        - type

      members:
        name:
          type: string

        description:
          type: string

        type:
          type: string

  traits:
    description: project-level architectural traits
    type: list
    item_type: string

  expression:
    description: active expression configuration for the genome
    type: object

    schema:
      required_members:
        - active_style

      members:
        active_style:
          type: string
