gene:
  name: semantics

purpose: define semantics within Codon genomes

codons:
  chromosome:
    meaning: named architectural domain or bounded context grouping one or more genes
    
  gene:
    meaning: primary architectural unit defined in its own file

  entity:
    meaning: persistent domain model owned by a gene

  capability:
    meaning: domain action a gene can perform

  relation:
    meaning: internal structural link between entities in the same gene

  reference:
    meaning: cross-gene entity link declared by the dependent gene

  trait:
    meaning: reusable architectural program expanding into concrete genome structure

  specification_structure:
    description: |
      Codon language specifications may organize explanatory and
      validation content within codons using structured rule categories.

    supported_sections:
      schema:
        description: |
          Describes the structural shape of a codon, including its
          members and allowed forms.

        subsections:
          members:
            description: |
              Defines the named members and their shapes within a construct.
              Use when listing the schema of an object.

          forms:
            description: |
              Enumerates alternate shapes or syntactic forms a construct may take
              (for example, shorthand vs structured forms).

      constraints:
        description: |
          Normative validity rules that must hold for a genome to be valid.
          Violations must be reported as validation errors.

      semantics:
        description: |
          Define the meaning of a construct or operation within the
          Codon language model.

      processing:
        description: |
          Defines how engines should process or apply constructs
          during loading, validation, mutation, or expression.

      guidance:
        description: |
          Non-normative recommendations that improve consistency or safety
          but do not affect genome validity.

      examples:
        description: |
          Non-normative illustrative snippets showing valid usage or outputs.

    constraints:
      - codons may include one or more of these sections when appropriate
      - specifications should prefer structured sections over large untyped rule lists
      - absence of a section implies no rules of that category are defined
      - specifications must not require any particular section structure unless explicitly defined by the gene schema
