gene:
  name: composition

purpose: define how a Codon genome is composed from manifest and gene files

types:
  composed_entity:
    description: normalized composed representation of an entity
    schema:
      members:
        name:
          type: genome.addressing.entity_identifier
        fields:
          type: object
          key: string
          value_type: language.field.field_definition
          required: false
          description: mapping of field names to normalized field definitions

  composed_capability:
    description: normalized composed representation of a capability
    schema:
      members:
        name:
          type: genome.addressing.capability_identifier
        description:
          type: string
          required: false
        inputs:
          type: object
          key: string
          value_type: language.field.field_definition
          required: false
          description: mapping of input names to normalized field definitions
        outputs:
          type: object
          key: string
          value_type: language.field.field_definition
          required: false
          description: mapping of output names to normalized field definitions
        effects:
          type: list 
          item_type: string
          required: false

  composed_gene:
    description: normalized composed representation of a gene
    schema:
      members:
        name:
          type: genome.addressing.gene_identifier
        chromosome:
          type: genome.addressing.chromosome_identifier
        purpose:
          type: string
          required: false
        dependencies:
          type: list
          item_type: genome.addressing.gene_reference
          required: false
        entities:
          type: list
          item_type: genome.composition.composed_entity
          required: false
        capabilities:
          type: list
          item_type: genome.composition.composed_capability
          required: false
        relations:
          type: list
          item_type: language.relation.relation_definition
          required: false
        references:
          type: list
          item_type: language.reference.reference_definition
          required: false
        traits:
          type: list
          item_type: string
          required: false

codons:
  principles:
    items:
      - genome.yaml is the genome manifest and must not contain inline gene definitions
      - genes are the primary architectural unit
      - each gene is defined in its own file
      - genes own codons such as entities, capabilities, relations, references, and traits
      - capabilities are first-class semantic actions
      - structure is explicit while details may be inferred
      - internal relations stay inside genes
      - cross-gene links are references declared by the dependent gene
      - implementation artifacts are produced through expression
      - genome mutations are applied through the shared patch system

  composition_root:
    description: |
      A Codon genome is composed relative to a composition root.
      The composition root is the filesystem directory containing
      genome.yaml and the genome structure directories.

    constraints:
      - genome.yaml must exist at the composition root
      - chromosomes/ must exist relative to the composition root
      - expression/ may exist relative to the composition root
      - embedded composition roots must use the reserved directory name .codon
      - all genome-relative paths are resolved from the composition root
      - composed genome discovery is scoped strictly to the composition root

  composed_genome:
    description: |
      The composed genome is the effective architectural model formed by
      genome.yaml plus all gene files discovered under chromosomes/
      relative to the composition root.

  ordering_rules:
    description: define deterministic ordering for discovery and emission to avoid order-dependent outputs

    constraints:
      - gene discovery for validation and generation must sort genes by chromosome identifier then gene identifier (both canonical forms)
      - within a gene, codon collections (entities, capabilities, relations, references, traits) must be processed in stable lexical order by identifier
      - traits applied at project or gene scope must be applied in lexical order of trait identifiers unless the trait system defines explicit ordering
      - emitted artifacts (validation reports, generated files) must use the same deterministic ordering to ensure repeatable outputs

  composed_genome_contract:
    description: |
      Define the canonical normalized representation of a composed genome
      used for interoperability between loaders, validators, and expression engines.

    schema:
      members:
        project:
          type: object
          description: project metadata from genome.yaml

        schema_version:
          type: string
          required: false
          description: declared schema version of the genome

        traits:
          type: list
          item_type: string
          required: false
          description: project-level traits after trait expansion

        genes:
          type: list
          item_type: genome.composition.composed_gene
          description: all genes in canonical sorted deterministic order

    processing:
      - the composed genome contract is produced after loading, resolution, and trait expansion
      - source-file shorthand and equivalent source forms must be normalized into the contract
      - canonical ordering must be deterministic

    constraints:
      - the composed genome contract is the interoperability boundary for loaders, validators, and expression engines
      - members not defined by the contract must not appear unless enabled by a future schema version
      - trait-expanded structures must conform to the same composition rules as handwritten genome structures

  filesystem_model:
    description: |
      Gene files are organized under chromosome directories within
      the chromosomes/ directory.

    constraints:
      - chromosomes/ contains one directory per chromosome
      - each chromosome directory may contain one or more direct child .yaml gene files
      - only .yaml files are treated as gene files
      - hidden files and directories must be ignored
      - nested subdirectories inside chromosome directories must be rejected unless enabled by future schema versions
      - each gene file must define exactly one gene
      - all valid gene files discovered under chromosomes/ relative to the composition root are included in the composed genome

  validation_pipeline:
    description: reference to validation pipeline rules defined in validation chromosome
    type: validation.pipeline.validation_pipeline

  validation_severity_policy:
    description: reference to validation severity policy defined in validation chromosome
    type: validation.pipeline.validation_severity_policy

  validation_severity_policy:
    description: classify validation findings into severities and define engine behavior

    semantics:
      severities:
        error: fatal violations that must prevent genome acceptance
        warning: non-fatal issues; engines may proceed but should report
        info: informational notices with no impact on acceptance

    constraints:
      - engines must reject genomes when any error severity finding is present
      - warnings must be reported but do not block acceptance
      - informational findings must be reported when available
      - structural and dependency violations are errors
      - unresolved references or missing dependency declarations are errors
      - identifier policy violations are errors
      - reserved-word usage is a warning unless the reserved word blocks resolution, in which case it is an error
      - duplicate traits or dependencies are warnings
      - normalization or inference notices are info unless they surface a conflict, which is an error
