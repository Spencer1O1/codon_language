gene:
  name: addressing

purpose: define the identifier scopes and canonical addressing formats used within a genome

types:
  chromosome_identifier:
    description: unique chromosome identifier within a genome
    type: string
    constraints:
      - canonical form: lower_snake_case using [a-z0-9_]
      - must match regex ^[a-z][a-z0-9_]*$
      - length must be between 1 and 64 characters
      - must not be a reserved word

  gene_identifier:
    description: unique gene identifier within its chromosome
    type: string
    constraints:
      - canonical form: lower_snake_case using [a-z0-9_]
      - must match regex ^[a-z][a-z0-9_]*$
      - length must be between 1 and 64 characters
      - must not be a reserved word

  entity_identifier:
    description: unique entity identifier within its gene
    type: string
    constraints:
      - canonical form: UpperCamelCase using [A-Za-z0-9]
      - must match regex ^[A-Z][A-Za-z0-9]*$
      - length must be between 1 and 64 characters
      - must not be a reserved word

  capability_identifier:
    description: unique capability identifier within its gene
    type: string
    constraints:
      - must be kebab-case using [a-z0-9-]
      - must match regex ^[a-z][a-z0-9-]*$
      - length must be between 3 and 80 characters
      - must not be a reserved word

codons:
  identifier_scopes:
    description: define identifier types and uniqueness scopes for named constructs

    schema:
      members:
        chromosome:
          type: genome.addressing.chromosome_identifier
          description: unique chromosome identifier within a genome

        gene:
          type: genome.addressing.gene_identifier
          description: unique gene identifier within its chromosome

        entity:
          type: genome.addressing.entity_identifier
          description: unique entity identifier within its gene

        capability:
          type: genome.addressing.capability_identifier
          description: unique capability identifier within its gene

    constraints:
      - chromosome names must be unique within a genome
      - gene names must be unique within a chromosome
      - entity names must be unique within a gene
      - capability identifiers must be unique within a gene

  reference_forms:
    description: define supported reference forms in the language

    schema:
      forms:
        primitive:
          description: intrinsic built-in language types
          examples:
            - string
            - boolean
            - int
            - float
            - list
            - object
            - any

        local:
          description: named constructs defined within the same gene
          format: gene.name
          example: field.scalar_type

        qualified:
          description: named constructs defined in another gene
          format: chromosome.gene.name
          example: genome.addressing.entity_reference

    constraints:
      - primitive references are intrinsic and require no dependency declaration
      - local references must resolve within the current gene
      - qualified references must resolve to a declared dependency unless the target is the current gene
      - reference resolution must be deterministic

  canonical_formats:
    description: define canonical qualified reference formats

    schema:
      members:
        gene_reference:
          description: canonical identifier for a gene
          format: chromosome.gene
          example: identity.user

        entity_reference:
          description: canonical identifier for an entity
          format: chromosome.gene.entity
          example: identity.user.User

    constraints:
      - canonical references must declare identifier forms
      - canonical reference resolution must be deterministic

  identifier_policy:
    description: global identifier policy, reserved words, and construct-to-type bindings

    reserved_words:
      - capabilities
      - codons
      - dependencies
      - entities
      - expression
      - gene
      - project
      - references
      - relations
      - schema
      - schema_version
      - traits
      - types

    semantics:
      - reserved words define names that are never valid as identifiers
      - identifier types define canonical casing, allowed characters, and length constraints

    constraints:
      general:
        - every named construct must define its identifier form through a declared identifier type
        - reserved words must not be used for any identifier
        - definition sites must validate names using the construct's identifier type
        - reference sites must use the same identifier type as the corresponding definition site

      construct_identifier_types:
        chromosome: genome.addressing.chromosome_identifier
        gene: genome.addressing.gene_identifier
        entity: genome.addressing.entity_identifier
        capability: genome.addressing.capability_identifier
