gene:
  name: entity

dependencies:
  - language.field
  - language.inference
  - genome.addressing

purpose: define the structure and inference rules of entity codons

codons:
  entity_definition:
    description: |
      Entities represent persistent domain models owned by a gene.

    default_fields:
      description: define default implicit fields for persistent entities

      implicit_definitions:
        id:
          type: uuid

        created_at:
          type: datetime

        updated_at:
          type: datetime

      constraints:
        - implicit default fields are supplied when not explicitly defined
        - explicit field definitions override implicit default field definitions
        - explicit overrides must conform to language.field.field_definition

    schema:
      key: genome.addressing.entity_identifier

      members:
        fields:
          description: mapping of entity field names to field definitions
          type: object
          key: field_name
          value_type: language.field.field_definition
          required: false

    processing:
      - fields may be inferred when omitted
      - inference sources may include capabilities, relations, references, and traits
      - field inference must follow language.inference.inference_model

    examples:
      simple_entity:
        User:
          fields:
            email: string
            display_name: string
