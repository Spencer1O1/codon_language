gene:
  name: entity

dependencies:
  - language.field

purpose: define the structure and inference rules of entity codons

types:
  entity_identifier:
    description: |
      identifier referencing an entity declared in the current gene
    type: string

codons:
  entity_definition:
    description: |
      Entities represent persistent domain models owned by a gene.

    default_fields:
      description: define default implicit fields for persistent entities

      implicit_definitions:
        id:
          type: uuid

        created_at:
          type: datetime

        updated_at:
          type: datetime

      constraints:
        - implicit default fields are supplied when not explicitly defined
        - explicit field definitions override implicit default field definitions
        - explicit overrides must conform to language.field.field_definition

    schema:
      fields:
        description: mapping of entity field names to field definitions
        type: object
        key: field_name
        value_type: language.field.field_definition
        required: false

    processing:
      rules:
        - fields may be inferred when omitted
        - inference may use capabilities
        - inference may use relations
        - inference may use references
        - inference may use traits

      precedence:
        description: define merge/override rules for explicit, implicit, and inferred fields
        rules:
          - ordering: explicit > implicit defaults > inferred
          - explicit field definitions replace any inferred or implicit definition for the same field name
          - implicit defaults apply only when the field name is absent after explicit definitions
          - inferred fields may populate only field names not present in explicit or implicit defaults
          - no deep merge is performed; field definitions are replaced whole at their precedence level
          - when multiple inference sources propose the same field name with conflicting shapes, validation must raise an error (inference conflict)
          - if an inferred field conflicts with an implicit default or explicit definition, validation must raise an error rather than merging

  examples:
    simple_entity:
      entities:
        User:
          fields:
            email: string
            display_name: string
