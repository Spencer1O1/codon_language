gene:
  name: relation

dependencies:
  - language.entity

purpose: define the structure and validation rules of internal relation codons

types:
  relation_type:
    description: define supported relation cardinalities
    values:
      - one-to-one
      - one-to-many
      - many-to-one
      - many-to-many

codons:
  relation_definition:
    description: |
      Relations describe structural links between entities within the same gene.

    schema:
      members:
        from:
          type: language.entity.entity_identifier
          required: true

        to:
          type: language.entity.entity_identifier
          required: true

        type:
          type: language.relation.relation_type
          required: true

        name:
          type: string
          required: true

    constraints:
      - source entity must belong to the declaring gene
      - target entity must belong to the declaring gene
      - internal relations must not reference external genes

    examples:
      simple_relation:
        relations:
          - from: Comment
            to: Issue
            type: many-to-one
            name: issue
