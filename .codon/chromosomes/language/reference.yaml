gene:
  name: reference

dependencies:
  - genome.addressing
  - language.relation
  - language.entity

purpose: define the structure and validation rules of cross-gene reference codons

codons:
  reference_definition:
    description: |
      References describe cross-gene links declared by the dependent gene.

    schema:
      members:
        from:
          type: language.entity.entity_identifier
          required: true
        to:
          type: genome.addressing.entity_reference
          required: true
        type:
          type: language.relation.relation_type
          required: true
        name:
          type: string
          required: true
        reference:
          type: string
          required: true
          default: id

    constraints:
      - the from entity must exist in the declaring gene
      - target gene must be listed in dependencies
      - references must not create circular gene dependencies
      - cross-gene references use ID semantics unless explicitly overridden
      - references do not imply direct repository access across genes

    examples:
      simple_reference:
        references:
          - from: Issue
            to: identity.user.User
            type: many-to-one
            name: assignee
            reference: id

     
