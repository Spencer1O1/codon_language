gene:
  name: trait_attachment

purpose: define where traits may be attached within the genome

codons:
  attachment_points:
    supported_scopes:
      - project
      - gene

    constraints:
      - project-level traits may expand across multiple chromosomes or genes
      - gene-level traits must expand only within the owning gene
      - unsupported trait scopes must be rejected unless enabled by future schema versions
