gene:
  name: field

dependencies:
  - genome.addressing

purpose: define the structure of field definitions used by entities

codons:
  field_definition:
    description: |
      Fields define scalar or structured properties on an entity.

    philosophy:
      - fields are secondary to structure and capabilities
      - explicit field definitions override inferred fields
      - field definitions should remain lightweight and portable across stacks

    supported_forms:
      shorthand:
        description: simple scalar type declaration
        example:
          title: string
          created_at: datetime

      structured:
        description: extended field definition for precision when needed

        fields:
          type:
            type: field.field_type
            required: true

          optional:
            type: boolean
            required: false

          unique:
            type: boolean
            required: false

          default:
            type: any
            required: false

          values:
            type: list
            required: false

          reference:
            type: genome.addressing.entity_reference
            required: false

        example:
          email:
            type: string
            unique: true
          status:
            type: enum
            values:
              - open
              - closed
          assignee:
            type: reference
            reference: identity.user.User

    rules:
      - a structured field definition must include type
      - reference must be present when type is reference
      - reference must not be present when type is not reference
      - values must be present when type is enum
      - values must not be present when type is not enum
      - reference targets must resolve to a valid addressable entity
      - cross-gene field references require a declared dependency on the target gene
      - explicit field definitions must remain valid regardless of inferred structure

  field_type:
    description: define supported field types

    values:
      - string
      - text
      - int
      - float
      - boolean
      - uuid
      - datetime
      - json
      - enum
      - reference

  validation_rules:
    rules:
      - field names must be unique within an entity
      - structured fields must be well-formed
      - enum fields must define values
      - reference targets must resolve deterministically