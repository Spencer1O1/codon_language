gene:
  name: capability

dependencies:
  - genome.addressing
  - language.field
  - language.inference

purpose: define the structure, semantics, and naming rules of capability codons

codons:
  capability_definition:
    description: |
      Capabilities describe domain actions that a gene can perform.

    semantics:
      - capabilities are semantic declarations of intent
      - capabilities describe what a system does, not how it is implemented
      - the semantic form is the default and recommended representation
      - structured capability definitions are an advanced form for cases requiring explicit detail
      - implementation artifacts are normally derived through expression

    schema:
      forms:
        semantic:
          description: kebab-case capability identifier following verb-noun pattern
          type: genome.addressing.capability_identifier

        structured:
          description: extended capability definition for cases requiring explicit structure
          key: genome.addressing.capability_identifier

          schema:
            members:
              description:
                type: string
                required: false

              inputs:
                type: object
                key: input_name
                value_type: language.field.field_definition
                required: false

              outputs:
                type: object
                key: output_name
                value_type: language.field.field_definition
                required: false

              effects:
                type: list
                item_type: string
                required: false

    examples:
      semantic:
        - create-issue
        - assign-issue
        - close-issue

      structured:
        create-issue:
          description: create a new issue
          key: create-issue
          inputs:
            title:
              type: string
            description:
              type: string
          outputs:
            issue:
              type: reference
              reference: tracking.issues.Issue
          effects:
            - creates tracking.issues.Issue

    processing:
      - structured details may be inferred from semantic capabilities
      - capabilities may contribute to inferred entity fields
      - capability-driven inference must follow language.inference.inference_model

    constraints:
      - capability names must be unique within a gene
      - structured capability definitions must be well-formed
      - structured inputs must conform to language.field.field_definition
      - structured outputs must conform to language.field.field_definition
      - effects must be strings
