gene:
  name: gene

dependencies:
  - genome.addressing

purpose: define the schema of a gene file

codons:
  gene_file:
    description: |
      Each admitted gene file defines exactly one gene and contains the
      architecture owned by that gene.

    schema:
      required_members:
        - gene
      optional_members:
        - purpose
        - types
        - dependencies
        - codons
      additional_members: forbidden

    constraints:
      - each gene file must define exactly one gene
      - the gene block must declare the gene name
      - gene files are the canonical home for gene-owned types, entities, capabilities, relations, references, and traits
      - unknown top-level fields must be rejected unless enabled by the active schema version

  gene:
    description: identify the gene defined by the file

    schema:
      members:
        name:
          type: genome.addressing.gene_identifier
          required: true

    constraints:
      - gene name must be unique within its chromosome
      - gene name must match the filename stem exactly
      - filename matching is case-sensitive
      - filename matching must not apply normalization or aliasing

  purpose:
    description: |
      Describe the purpose of the gene

  types:
    description: |
      Reusable schema types scoped to the gene specification.
      Types are referenced by other schema members within the same gene.

    schema:
      members:
        <type_name>:
          description: schema definition for a reusable type
          type: any
          required: false

    constraints:
      - type names must be unique within the gene
      - types may be referenced by local or fully-qualified identifiers according to the addressing rules
      - types must not conflict with codon names

  dependencies:
    description: |
      Explicit dependencies on other genes required for schema resolution,
      semantic interpretation, or processing behavior.

    schema:
      type: list
      item_type: genome.addressing.gene_reference
      required: false

    constraints:
      - dependencies must reference existing genes
      - dependencies must use canonical qualified gene references
      - duplicate dependency entries must be rejected
      - genes with no external dependencies may omit this field
      - genes must declare dependencies on any external gene whose definitions are required for schema resolution, semantic interpretation, or processing behavior

  codons:
    description: |
      The codons section contains architectural instructions
      owned by the gene.

    schema:
      allowed_members:
        - entities
        - capabilities
        - relations
        - references
        - traits

    constraints:
      - unknown codons must be rejected unless enabled by future schema versions
      - each codon must conform to its corresponding schema
