projections:
  chromosome:
    description: |
      Chromosomes influence package grouping but do not necessarily map
      directly to top-level implementation directories.

  gene:
    description: |
      A gene may project into one or more implementation artifacts.

  projection_targets:
    gene_loader:
      outputs:
        - layer: pkg
          path: pkg/genome/{{ gene_snake }}.go

    validation_rule:
      outputs:
        - layer: pkg
          path: pkg/validation/genome_validator/rules/{{ rule_snake }}.go

    patch_model:
      outputs:
        - layer: pkg
          path: pkg/patch/{{ gene_snake }}.go

    helper:
      outputs:
        - layer: internal
          path: internal/{{ helper_group }}/{{ helper_snake }}.go

  generation_rules:
    - expression must preserve the semantic meaning of the genome
    - implementation structure may differ from genome structure according to expression rules
    - reusable Go implementation should be written under pkg/
    - supporting helpers should be written under internal/
    - regeneration behavior should preserve user-owned code according to generator rules