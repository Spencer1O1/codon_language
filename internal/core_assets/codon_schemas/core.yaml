# Core codon schemas expressed with typed definitions.
# Built-ins: primitives, objects, fields, and exported nucleotides are auto-imported.

codons:
  entities:
    version: 1.0.0
    description: persistent domain models owned by a gene
    type: Map<entity_name, field<object>>

  capabilities:
    version: 1.0.0
    description: domain actions a gene performs
    type: |
      Map<capability_name, { 
        effects: List<string>, 
        inputs: Optional<object>, 
        outputs: Optional<object> 
      }>

  relations:
    version: 1.0.0
    description: structural relations between entities
    type: |
      Map<relation_name, { 
        from: entity_name, 
        to: entity_name, 
        type: Union<
          "one-to-one", 
          "one-to-many", 
          "many-to-one", 
          "many-to-many
        ">,
        ownership: Optional<Union<"from", "to">>,
        cascade: Optional<Union<"cascade", "restrict", "nullify">>,
      }>

  traits:
    version: 1.0.0
    description: list of trait names applied within a gene scope
    type: List<gene_trait_name>

  documentation:
    version: 1.0.0
    description: non-normative semantic notes and examples
    type: |
      {
        semantics: Optional<List<string>>,
        examples: Optional<List<object>>,
      }

  implementation:
    version: 1.0.0
    description: normative rule lists for implementation
    type: |
      {
        rules: List<{
          code: string,
          severity: Union<"error", "warn", "info">,
          message: string,
        }>,
      }
