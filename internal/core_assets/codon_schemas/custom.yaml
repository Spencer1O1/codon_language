codons:
  gene_format:
    version: 1.0.0
    description: shape of a gene file
    schema: |
      { 
        gene: TypeExpr, 
        description: TypeExpr, 
        codons: TypeExpr, 
        traits: TypeExpr 
      }

  genome_manifest_format:
    version: 1.0.0
    description: shape of a genome (manifest) file
    schema: |
      {
        schema_version: TypeExpr,
        project: TypeExpr,
        traits: TypeExpr
      }
