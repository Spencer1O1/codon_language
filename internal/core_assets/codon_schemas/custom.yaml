codons:
  gene_format:
    version: 1.0.0
    description: shape of a gene file
    schema: |
      { 
        gene: { type_expr: TypeExpr }, 
        description: { type_expr: TypeExpr }, 
        codons: { type_expr: TypeExpr }, 
        traits: { type_expr: TypeExpr } 
      }

  genome_manifest_format:
    version: 1.0.0
    description: shape of a genome (manifest) file
    schema: |
      {
        schema_version: { type_expr: TypeExpr },
        project: { type_expr: TypeExpr },
        traits: { type_expr: TypeExpr }
      }
