codons:
  gene_format:
    version: 1.0.0
    description: shape of a gene file
    schema: |
      { 
        gene: { type_expr: TypeExpr }, 
        description: { type_expr: TypeExpr }, 
        codons: { type_expr: TypeExpr }, 
        traits: { type_expr: TypeExpr } 
      }

  genome_manifest_format:
    version: 1.0.0
    description: shape of a genome (manifest) file
    schema: |
      {
        schema_version: { type_expr: TypeExpr },
        project: { type_expr: TypeExpr },
        traits: { type_expr: TypeExpr }
      }

  composed_genome_format:
    version: 1.0.0
    description: shape of the composed genome artifact
    schema: |
      {
        schema_version: { type_expr: TypeExpr },
        manifest: { type_expr: TypeExpr },
        codon_schemas: { type_expr: TypeExpr },
        nucleotypes: { type_expr: TypeExpr },
        genes: { type_expr: TypeExpr },
        traits_applied: { type_expr: TypeExpr },
        issues: { type_expr: TypeExpr }
      }
